name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: masters-overlay.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: masters-overlay
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/x86_64-pc-windows-msvc/masters-overlay.exe artifacts/masters-overlay.exe
          mv artifacts/aarch64-apple-darwin/masters-overlay artifacts/masters-overlay-mac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Masters 2026 (${{ steps.sha.outputs.short }})
          body: |
            Automated build from commit ${{ github.sha }}.

            - **Windows**: Download `masters-overlay.exe`
            - **macOS**: Download `masters-overlay-mac`
          files: |
            artifacts/masters-overlay.exe
            artifacts/masters-overlay-mac
          make_latest: true
